<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Downloader | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2fe; --neon-pink: #ff007f; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .main-container { width: 100%; max-width: 400px; padding: 40px 20px; text-align: center; transition: 0.5s; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 35px 25px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0, 242, 254, 0.1); }
        
        h1 { font-size: 2.2rem; background: linear-gradient(45deg, var(--neon), var(--neon-pink)); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; }
        p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1.5px solid #222; border-radius: 12px; color: #fff; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px var(--neon); }
        
        .btn { background: linear-gradient(45deg, var(--neon), #4facfe); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }

        .heart-trigger { font-size: 2.2rem; color: var(--neon-pink); cursor: pointer; margin-top: 30px; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 20px var(--neon-pink); } }

        #adminView { display: none; width: 90%; max-width: 500px; padding: 20px; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .channel-slot { display: flex; gap: 8px; margin-bottom: 5px; }
        label { font-size: 0.8rem; color: var(--neon); margin-top: 15px; display: block; font-weight: bold; }
        
        .footer { margin-top: auto; padding: 25px; font-size: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container" id="mainView">
        <div class="glass-card">
            <h1>Urban Clash</h1>
            <p class="subtitle">Скачивай видео без водяных знаков</p>
            <input type="text" id="videoUrl" placeholder="Вставьте ссылку здесь...">
            <button class="btn" id="dlBtn" onclick="startDownload()">Скачать сейчас</button>
            
            <div class="heart-trigger" onclick="handleHeart()">
                <i class="fa-solid fa-heart"></i>
            </div>
        </div>
    </div>

    <div id="adminView">
        <div class="glass-card" style="text-align: left;">
            <h2 style="color: var(--neon); text-align: center; margin-top: 0;">🛡 Admin Panel</h2>
            
            <label>API Токен бота:</label>
            <input type="text" id="botToken" placeholder="12345:AAAbbbccc...">
            
            <label>Приветствие в боте:</label>
            <textarea id="welcomeMsg" rows="2" placeholder="Привет! Я бот..."></textarea>
            
            <label>Каналы подписки (до 10):</label>
            <div id="chanContainer">
                <input type="text" class="chan-input" placeholder="@channel_one">
            </div>
            <button onclick="addInput()" style="background:none; border:1px dashed #444; color:#666; width:100%; padding:5px; border-radius:8px; cursor:pointer;">+ добавить канал</button>
            
            <button class="btn" style="margin-top: 25px;" onclick="updateAdmin()">Сохранить настройки</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; width:100%; margin-top:10px; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <div class="footer">
        powered by @lyneok | Easy Downloader © 2026
    </div>

    <script>
        let heartClicks = 0;
        const API_URL = "https://temki-jgp0.onrender.com"; // Твой бэкенд

        function handleHeart() {
            heartClicks++;
            if(heartClicks === 15) {
                if(prompt("Введите код доступа:") === "250515") {
                    document.getElementById('mainView').style.display = 'none';
                    document.getElementById('adminView').style.display = 'block';
                }
                heartClicks = 0;
            }
        }

        function addInput() {
            const cont = document.getElementById('chanContainer');
            if(cont.children.length < 10) {
                const inp = document.createElement('input');
                inp.className = "chan-input";
                inp.placeholder = "@channel_" + (cont.children.length + 1);
                cont.appendChild(inp);
            }
        }

        async function updateAdmin() {
            const channels = Array.from(document.querySelectorAll('.chan-input')).map(i => i.value).filter(v => v);
            const data = {
                token: document.getElementById('botToken').value,
                welcome: document.getElementById('welcomeMsg').value,
                channels: channels
            };
            try {
                const res = await fetch(`${API_URL}/api/admin`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("Настройки Urban Clash обновлены!");
            } catch(e) { alert("Ошибка связи с сервером!"); }
        }

        async function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('dlBtn');
            if(!url) return;
            
            btn.innerText = "ОБРАБОТКА...";
            try {
                const res = await fetch(`${API_URL}/api/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await res.json();
                if(data.success) {
                    window.open(data.link, '_blank');
                } else {
                    alert("Ошибка: " + data.error);
                }
            } catch(e) { alert("Сервер Render еще просыпается, подожди 30 сек и нажми еще раз."); }
            btn.innerText = "Скачать сейчас";
        }
    </script>
</body>
</html>
