<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Downloader | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2fe; --neon-pink: #ff007f; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Главный экран */
        .main-ui { width: 100%; max-width: 450px; padding: 50px 20px; text-align: center; transition: 0.5s; }
        .glass-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 20px; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0, 242, 254, 0.1); }
        
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(45deg, var(--neon), var(--neon-pink)); -webkit-background-clip: text; color: transparent; filter: drop-shadow(0 0 10px rgba(0,242,254,0.5)); }
        
        input { width: 100%; padding: 16px; background: #111; border: 2px solid #222; border-radius: 12px; color: #fff; font-size: 1rem; margin: 20px 0; transition: 0.3s; }
        input:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px var(--neon); }
        
        .download-btn { background: linear-gradient(45deg, var(--neon), #4facfe); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Секретное сердечко */
        .secret-heart { font-size: 2rem; color: var(--neon-pink); cursor: pointer; margin-top: 30px; transition: 0.3s; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 20px var(--neon-pink); } 100% { transform: scale(1); opacity: 0.8; } }

        /* Админка (скрыта) */
        .admin-panel { display: none; width: 90%; max-width: 600px; padding: 30px; background: #0a0a0a; border: 2px solid var(--neon); border-radius: 20px; margin: 20px 0; }
        .channel-input { display: flex; gap: 10px; margin-bottom: 8px; }
        
        .footer { margin-top: auto; padding: 25px; font-size: 0.8rem; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="main-ui" id="mainView">
        <div class="glass-box">
            <h1>Easy Downloader</h1>
            <p style="color: #666;">TikTok • Shorts • Pinterest • Likee</p>
            <input type="text" id="videoUrl" placeholder="Вставь ссылку...">
            <button class="download-btn" onclick="processDownload()">Скачать видео</button>
            
            <div class="secret-heart" onclick="heartClick()">
                <i class="fa-solid fa-heart"></i>
            </div>
        </div>
    </div>

    <div class="admin-panel" id="adminView">
        <h2 style="color: var(--neon); text-align: center;">🛡 Admin Console</h2>
        
        <div style="margin-top: 20px;">
            <label>🤖 Токен бота:</label>
            <input type="text" id="token" placeholder="API Token from BotFather">
            
            <label>📢 Обязательные каналы (до 10):</label>
            <div id="channelsContainer">
                <input type="text" class="chan-link" placeholder="@channel1">
            </div>
            <button onclick="addChannelInput()" style="background:#222; color:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">+ Добавить канал</button>
            
            <label style="display:block; margin-top:20px;">📝 Приветствие:</label>
            <textarea id="welcome" style="width:100%; background:#111; color:#fff; border:1px solid #333; border-radius:10px; padding:10px;" rows="3"></textarea>
            
            <button class="download-btn" style="margin-top:20px;" onclick="saveAdmin()">Сохранить настройки</button>
        </div>
    </div>

    <div class="footer">
        powered by @lyneok | Easy Downloader © 2026
    </div>

    <script>
        let clicks = 0;
        const SERVER_URL = 'https://твой-сервер.onrender.com';

        // Пасхалка
        function heartClick() {
            clicks++;
            if (clicks === 15) {
                const pass = prompt("Введите код доступа:");
                if (pass === "250515") {
                    document.getElementById('mainView').style.display = 'none';
                    document.getElementById('adminView').style.display = 'block';
                } else {
                    alert("Неверный пароль!");
                    clicks = 0;
                }
            }
        }

        function addChannelInput() {
            const container = document.getElementById('channelsContainer');
            if (container.getElementsByTagName('input').length < 10) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'chan-link';
                input.placeholder = '@channel' + (container.getElementsByTagName('input').length + 1);
                container.appendChild(input);
            } else {
                alert("Максимум 10 каналов!");
            }
        }

        async function saveAdmin() {
            const channels = Array.from(document.querySelectorAll('.chan-link')).map(i => i.value).filter(v => v);
            const data = {
                token: document.getElementById('token').value,
                welcome: document.getElementById('welcome').value,
                channels: channels
            };
            
            await fetch(`${SERVER_URL}/api/admin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("Настройки обновлены!");
        }

        async function processDownload() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return;
            const btn = document.querySelector('.download-btn');
            btn.innerText = "ЗАГРУЗКА...";
            
            try {
                const res = await fetch(`${SERVER_URL}/api/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const result = await res.json();
                if(result.success) window.open(result.link, '_blank');
            } catch(e) { alert("Ошибка сервера!"); }
            btn.innerText = "Скачать видео";
        }
    </script>
</body>
</html>
