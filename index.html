<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Clash | Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f0c29;
            --bg-grad: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --accent-hover: #4facfe;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: var(--bg-grad);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Навигация */
        .nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .nav button {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav button.active, .nav button:hover { color: var(--accent); }

        /* Контейнеры */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .container.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Карточки Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            text-align: center;
        }

        h1 { font-size: 28px; margin-bottom: 10px; background: linear-gradient(to right, var(--accent), #bb86fc); -webkit-background-clip: text; color: transparent; }
        h2 { font-size: 20px; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        p { color: var(--text-muted); margin-bottom: 20px; }

        /* Инпуты и формы */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted); }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        
        input[type="file"] { padding: 10px; background: transparent; border: none; }

        /* Кнопки */
        .btn {
            background: linear-gradient(45deg, var(--accent), var(--accent-hover));
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent); }
        .btn-small { padding: 8px 15px; font-size: 12px; width: auto; margin-top: 10px; background: #333; color: white; }
        
        /* Иконки платформ */
        .platforms { font-size: 24px; color: var(--text-muted); margin-bottom: 20px; letter-spacing: 15px; }
        
        /* Динамические кнопки в рассылке */
        .dynamic-buttons-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .dynamic-row { display: flex; gap: 10px; }

        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="nav">
        <button id="tab-home" class="active" onclick="switchTab('home')">Скачать видео</button>
        <button id="tab-admin" onclick="switchTab('admin')">Admin Panel 🔒</button>
    </div>

    <div id="home" class="container active">
        <div class="glass-card">
            <h1>Urban Clash Downloader</h1>
            <p>Скачивай видео без водяных знаков в максимальном качестве</p>
            
            <div class="platforms">
                <i class="fa-brands fa-tiktok"></i>
                <i class="fa-brands fa-youtube"></i>
                <i class="fa-brands fa-pinterest"></i>
                <i class="fa-solid fa-heart"></i> </div>

            <div class="input-group">
                <input type="text" placeholder="Вставь ссылку на видео сюда..." id="videoUrl">
            </div>
            <button class="btn" onclick="startDownload()"><i class="fa-solid fa-download"></i> Скачать сейчас</button>
        </div>
    </div>

    <div id="admin" class="container">
        <div class="glass-card">
            <h2>⚙️ Настройки Бота</h2>
            <div class="input-group">
                <label>Токен бота (BotFather):</label>
                <input type="password" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
            </div>
            <div class="input-group">
                <label>Приветственное сообщение (/start):</label>
                <textarea rows="3" placeholder="Привет! Я помогу скачать видео..."></textarea>
            </div>
        </div>

        <div class="glass-card">
            <h2>📢 Обязательная подписка</h2>
            <div class="input-group">
                <label>Ссылка на канал (для проверки подписки):</label>
                <input type="text" placeholder="https://t.me/urbanclash">
            </div>
        </div>

        <div class="glass-card">
            <h2>🚀 Создание рассылки</h2>
            <div class="input-group">
                <label>Текст рассылки:</label>
                <textarea rows="4" placeholder="Введите рекламный текст..."></textarea>
            </div>
            <div class="input-group">
                <label>Прикрепить фото (файл):</label>
                <input type="file" accept="image/*">
            </div>
            
            <div class="input-group">
                <label>Inline-кнопки (до 10 шт):</label>
                <div class="dynamic-buttons-list" id="btnList">
                    </div>
                <button class="btn btn-small" onclick="addDynamicButton()">+ Добавить кнопку</button>
            </div>

            <button class="btn" style="margin-top: 15px;" onclick="alert('Рассылка запущена!')">Запустить рассылку</button>
        </div>
    </div>

    <div class="footer">
        Powered by @sswckk | Urban Clash © 2026
    </div>

    <script>
        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // Имитация скачивания
        function startDownload() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Пожалуйста, вставьте ссылку на видео!");
            alert("Подключение к серверу для обработки: " + url + "\n\n(Здесь должен сработать бэкенд API)");
        }

        // Динамическое добавление кнопок в админке
        let btnCount = 0;
        function addDynamicButton() {
            if (btnCount >= 10) {
                alert("Достигнут лимит в 10 кнопок!");
                return;
            }
            btnCount++;
            
            const btnList = document.getElementById('btnList');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `
                <input type="text" placeholder="Текст (кнопка ${btnCount})" style="flex: 1;">
                <input type="text" placeholder="Ссылка (https://...)" style="flex: 2;">
            `;
            btnList.appendChild(row);
        }
    </script>
</body>
</html>
